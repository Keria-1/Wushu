<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <!-- 导航 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-red">
        <div class="container">
            <a class="navbar-brand" href="index.html">中华武术研学交流网</a>
            
            <div class="d-flex align-items-center gap-3">
                <a href="index.html" class="text-white text-decoration-none me-3">
                    <i class="fa fa-home me-1"></i> 首页
                </a>

                <div class="dropdown">
                    <a class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <img id="nav-avatar" 
                             src="" 
                             class="rounded-circle me-2" 
                             style="width: 32px; height: 32px; object-fit: cover;">
                        <span id="nav-username">欢迎，</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="profile.html">
                            <i class="fa fa-user me-2"></i>个人中心
                        </a></li>
                        <li><div class="dropdown-divider"></div></li>
                        <li><a class="dropdown-item" href="/logout">
                            <i class="fa fa-sign-out me-2"></i>退出登录
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="text-center mb-4">
            <h2 class="d-inline-block border-bottom border-3 border-danger pb-1">个人中心</h2>
        </div>

        <!-- 用户信息卡片 -->
        <div class="card mb-4 border-red">
            <div class="card-body bg-light-red p-4">
                <div class="row align-items-center">
                    <div class="col-md-2 text-center">
                        <img id="avatar" 
                             src="" 
                             class="rounded-circle user-avatar" 
                             style="width: 100px; height: 100px; object-fit:cover;">
                    </div>
                    <div class="col-md-10">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <div class="p-2 rounded bg-white bg-opacity-75">
                                    <i class="fa fa-id-card text-danger me-2"></i>
                                    用户ID：<strong id="user_id"></strong>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="p-2 rounded bg-white bg-opacity-75">
                                    <i class="fa fa-user text-danger me-2"></i>
                                    用户名：<strong id="username_info"></strong>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="p-2 rounded bg-white bg-opacity-75">
                                    <i class="fa fa-phone text-danger me-2"></i>
                                    手机号：<strong id="phone"></strong>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="p-2 rounded bg-white bg-opacity-75">
                                    <i class="fa fa-envelope text-danger me-2"></i>
                                    邮箱：<strong id="email"></strong>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 表单卡片 -->
        <div class="card border-red">
            <div class="card-header bg-red text-white">个人资料</div>
            <div class="card-body">
                <form id="profileForm">
                    <div class="mb-3 row">
                        <label class="col-sm-2 col-form-label form-label">用户账号</label>
                        <div class="col-sm-10">
                            <input type="text" id="form_id" class="form-control" readonly>
                        </div>
                    </div>
                    <div class="mb-3 row">
                        <label class="col-sm-2 col-form-label form-label">用户名</label>
                        <div class="col-sm-10">
                            <input type="text" id="form_username" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3 row">
                        <label class="col-sm-2 col-form-label form-label">手机号</label>
                        <div class="col-sm-10">
                            <input type="text" id="form_phone" class="form-control" readonly>
                        </div>
                    </div>
                    <div class="mb-3 row">
                        <label class="col-sm-2 col-form-label form-label">邮箱</label>
                        <div class="col-sm-10">
                            <input type="text" id="form_email" class="form-control">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
       window.onload = function() {
            console.log("开始加载用户信息...");
            fetch('/api/user/info')
                .then(res => {
                    console.log("接口响应状态:", res.status);
                    return res.json();
                })
                .then(data => {
                    if (data.code === 200 && data.data) {
                        let u = data.data;

                        document.getElementById('user_id').innerText = u.id || '未获取';
                        document.getElementById('username_info').innerText = u.username || '未获取';
                        document.getElementById('phone').innerText = u.phone || '未获取';
                        document.getElementById('email').innerText = u.email || '未设置';

                        document.getElementById('form_id').value = u.id || '';
                        document.getElementById('form_username').value = u.username || '';
                        document.getElementById('form_phone').value = u.phone || '';
                        document.getElementById('form_email').value = u.email || '';

                        const avatarEl = document.getElementById('avatar');
                        if (u.avatar && u.avatar.trim() !== '') {
                            avatarEl.src = '/static/' + u.avatar;
                        } else {
                            avatarEl.src = '/static/images/default-avatar.png';
                        }

                        const navAvatar = document.getElementById('nav-avatar');
                        const navName = document.getElementById('nav-username');
                        
                        if (navName) {
                            navName.innerText = "欢迎，" + (u.username || "用户");
                        }
                        
                        if (navAvatar) {
                            if (u.avatar && u.avatar.trim() !== '') {
                                navAvatar.src = '/static/' + u.avatar;
                            } else {
                                navAvatar.src = '/static/images/default-avatar.png';
                            }
                        }

                    } else {
                        alert("获取用户信息失败：" + (data.msg || "用户数据为空"));
                        if (data.code === 401) {
                            window.location.href = '/login.html';
                        }
                    }
                })
                .catch(err => {
                    console.error("请求失败:", err);
                });
        };
    </script>
</body>
</html>
