<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 中华武术研学交流网</title>
    <!-- 引入Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!--引入自定义样式-->
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <!-- 注册容器 -->
    <div class="register-container">
        <div class="register-card">
            <!-- 注册卡片头部 -->
            <div class="register-header">
                <h3><i class="fas fa-user-plus me-2"></i>用户注册</h3>
                <p class="mb-0 mt-2">加入我们，共探中华武术之美</p>
            </div>
            <!-- 注册表单 -->
            <div class="register-body">
                <form id="registerForm">
                    <!-- ========== 新增：头像上传区域 ========== -->
                    <div class="avatar-upload">
                        <div class="avatar-wrapper" id="avatarWrapper">
                            <div class="avatar-placeholder">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="avatar-overlay">点击上传</div>
                        </div>
                        <input type="file" id="avatarInput" accept="image/png,image/jpeg,image/jpg">
                        <div class="avatar-tip">支持JPG/PNG格式，建议尺寸200x200</div>
                    </div>

                    <div class="mb-3">
                        <label for="regUsername" class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="regUsername" placeholder="请设置用户名（3-16位）" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="regPhone" class="form-label">手机号</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-mobile-alt"></i></span>
                            <input type="tel" class="form-control" id="regPhone" placeholder="请输入11位手机号" required>
                        </div>
                    </div>
                    <div class="mb-3 verify-code">
                        <div style="flex: 1;">
                            <label for="regCode" class="form-label">验证码</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-shield-alt"></i></span>
                                <input type="text" class="form-control" id="regCode" placeholder="请输入验证码" required>
                            </div>
                        </div>
                        <div style="display: flex; align-items: flex-end;">
                            <button type="button" class="btn-code" id="getCodeBtn">获取验证码</button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="regPassword" class="form-label">设置密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="regPassword" placeholder="请设置6-16位密码（字母+数字+符号）" required>
                            <span class="input-group-text password-toggle" id="togglePwd1">
                                <i class="fas fa-eye-slash"></i>
                            </span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="regConfirmPwd" class="form-label">确认密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock-open"></i></span>
                            <input type="password" class="form-control" id="regConfirmPwd" placeholder="请再次输入密码" required>
                            <span class="input-group-text password-toggle" id="togglePwd2">
                                <i class="fas fa-eye-slash"></i>
                            </span>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="agreeProtocol" required>
                        <label class="form-check-label" for="agreeProtocol">
                            我已阅读并同意<a href="#" class="text-danger">《用户服务协议》</a>和<a href="#" class="text-danger">《隐私政策》</a>
                        </label>
                    </div>
                    <button type="submit" class="btn-register">完成注册</button>
                </form>
                <div class="register-link">
                    已有账号？<a href="login.html">立即登录</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // 1. 密码显示/隐藏切换通用函数
    function initPasswordToggle(toggleId, inputId) {
        const toggleBtn = document.getElementById(toggleId);
        const pwdInput = document.getElementById(inputId);
        
        toggleBtn.addEventListener('click', function() {
            const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
            pwdInput.setAttribute('type', type);
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye-slash');
            icon.classList.toggle('fa-eye');
        });
    }

    // 初始化密码切换
    initPasswordToggle('togglePwd1', 'regPassword');
    initPasswordToggle('togglePwd2', 'regConfirmPwd');

    // 2. 验证码倒计时
    const getCodeBtn = document.getElementById('getCodeBtn');
    let countdown = 0;
    getCodeBtn.addEventListener('click', function() {
        const phone = document.getElementById('regPhone').value;
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            alert('请输入有效的11位手机号！');
            return;
        }
        if (countdown === 0) {
            countdown = 60;
            getCodeBtn.disabled = true;
            getCodeBtn.textContent = `重新获取(${countdown}s)`;
            const timer = setInterval(() => {
                countdown--;
                getCodeBtn.textContent = `重新获取(${countdown}s)`;
                if (countdown === 0) {
                    clearInterval(timer);
                    getCodeBtn.disabled = false;
                    getCodeBtn.textContent = '获取验证码';
                }
            }, 1000);
            alert('验证码已发送至您的手机，验证码：123456（仅测试）');
        }
    });

    const avatarWrapper = document.getElementById('avatarWrapper');
    const avatarInput = document.getElementById('avatarInput');
    let avatarFile = null; // 存储选择的头像文件

    // 点击头像区域触发文件选择
    avatarWrapper.addEventListener('click', () => {
        avatarInput.click();
    });

    // 监听文件选择，实时预览头像
    avatarInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // 验证文件类型
        if (!file.type.startsWith('image/')) {
            alert('请选择图片文件！');
            return;
        }

        // 验证文件大小（限制2MB）
        if (file.size > 2 * 1024 * 1024) {
            alert('图片大小不能超过2MB！');
            return;
        }

        // 保存文件对象，用于提交
        avatarFile = file;

        // 生成预览图
        const reader = new FileReader();
        reader.onload = function(event) {
            // 替换为预览图片
            avatarWrapper.innerHTML = `
                <img src="${event.target.result}" class="avatar-preview">
                <div class="avatar-overlay">更换头像</div>
            `;
        };
        reader.readAsDataURL(file);
    });

    // 3. 表单提交
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        // 获取表单值
        const username = document.getElementById('regUsername').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const code = document.getElementById('regCode').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const confirmPwd = document.getElementById('regConfirmPwd').value.trim();

        // 前端验证
        if (username.length < 3 || username.length > 16) {
            alert('用户名需为3-16位！');
            return;
        }
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            alert('请输入有效的11位手机号！');
            return;
        }
        if (code !== '123456') {
            alert('验证码错误！（测试验证码：123456）');
            return;
        }
        // 统一密码规则：8-20位
        const pwdReg = /^(?=.*[a-zA-Z])(?=.*\d)(?=.*[.!@#$%^&*()_\-+=])[a-zA-Z\d.!@#$%^&*()_\-+=]{6,20}$/;
        if (!pwdReg.test(password)) {
            alert('密码需为8-20位，包含字母、数字和符号（如.、!、@等）');
            return;
        }
        if (password !== confirmPwd) {
            alert('两次输入的密码不一致！');
            return;
        }

        try {
            const formData = new FormData();
            formData.append('username', username);
            formData.append('phone', phone);
            formData.append('code', code);
            formData.append('password', password);
            // 如果用户选择了头像，则添加到表单数据
            if (avatarFile) {
                formData.append('avatar', avatarFile);
            }

            // 调用后端注册接口
            const response = await fetch('/api/register', {
                method: 'POST',
                body: formData // 直接传递FormData
            });

            const result = await response.json();
            if (result.code === 200) {
                alert('注册成功！即将跳转到登录页');
                window.location.href = 'login.html';
            } else {
                alert(`注册失败：${result.msg}`);
            }
        } catch (error) {
            console.error('注册接口调用失败：', error);
            alert('网络异常，请检查后端服务是否启动！');
        }
    });
    </script>
</body>
</html>
