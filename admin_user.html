<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户管理 - 武术研学管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <link rel="stylesheet" href="/css/admin_user.css" >
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <h1>中华武术研学交流网管理平台</h1>
        <div>
            <span style="margin-right: 10px;">超级管理员</span>
            <a href="/admin/logout">退出登录</a>
        </div>
    </div>

    <!-- 主体容器：侧边栏+内容区 -->
    <div class="main-container">
        <!-- 左侧侧边栏 -->
        <div class="sidebar">
            <a href="/admin/index.html" class="menu-item">系统首页</a>
            <a href="/admin/user.html" class="menu-item active">用户管理</a>
            <a href="/admin/research.html" class="menu-item">研学项目管理</a>
            <a href="/admin/news.html" class="menu-item">武术资讯管理</a>
            <a href="/admin/enroll.html" class="menu-item">报名审核管理</a>
            <a href="/admin/carousel.html" class="menu-item">轮播图管理</a>
            <a href="/admin/log.html" class="menu-item">操作日志</a>
        </div>

        <!-- 右侧内容区 -->
        <div class="content-area">
            <div class="content-card">
                <h3>用户注册信息管理</h3>
                
                <!-- 搜索栏 + 操作按钮 -->
                <div class="search-bar d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <input type="text" id="keyword" class="form-control" style="width: 300px;" placeholder="输入手机号/用户名搜索">
                        <button class="btn btn-primary mt-2" onclick="loadUserList()">搜索</button>
                        <button class="btn btn-default mt-2" onclick="$('#keyword').val(''); loadUserList()">重置</button>
                    </div>
                    <div>
                        <button class="btn btn-add">添加用户</button>
                        <button class="btn btn-del ms-2" onclick="batchDeleteUser()">批量删除</button>
                    </div>
                </div>

                <!-- 用户列表 -->
                <table class="table table-bordered table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th width="50"><input type="checkbox" id="checkAll"></th>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>手机号</th>
                            <th>邮箱</th>
                            <th>注册时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- 数据会通过JS动态加载 -->
                    </tbody>
                </table>

                <!-- 分页 -->
                <div id="pagination" class="d-flex justify-content-center mt-3">
                    <!-- 分页按钮会动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 当前页码
        let currentPage = 1;
        const pageSize = 10;

        // 页面加载时获取用户列表 + 全选功能
        $(function() {
            loadUserList();
            
            // 全选/取消全选
            $('#checkAll').click(function() {
                $('tbody input[type="checkbox"]').prop('checked', $(this).prop('checked'));
            });
        });

        // 加载用户列表
        function loadUserList() {
            const keyword = $('#keyword').val().trim();
            
            $.ajax({
                url: '/admin/api/user/list',
                type: 'GET',
                data: {
                    page: currentPage,
                    size: pageSize,
                    keyword: keyword
                },
                success: function(res) {
                    if (res.code === 200) {
                        renderUserList(res.data.list);
                        renderPagination(res.data.total);
                    } else {
                        alert(res.msg);
                    }
                },
                error: function() {
                    alert('网络异常，请重试');
                }
            });
        }

        // 渲染用户列表
        function renderUserList(list) {
            const $tbody = $('#userTableBody');
            $tbody.empty();

            if (list.length === 0) {
                $tbody.html('<tr><td colspan="8" class="text-center">暂无用户数据</td></tr>');
                return;
            }

            list.forEach(user => {
                const statusText = user.status === 1 ? '启用' : '禁用';
                const statusBtnClass = user.status === 1 ? 'btn-warning' : 'btn-success';
                const statusBtnText = user.status === 1 ? '禁用' : '启用';
                const newStatus = user.status === 1 ? 0 : 1;

                const tr = `
                    <tr>
                        <td><input type="checkbox" value="${user.id}"></td>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.phone}</td>
                        <td>${user.email || '-'}</td>
                        <td>${user.create_time}</td>
                        <td><span class="badge ${user.status === 1 ? 'bg-success' : 'bg-danger'}">${statusText}</span></td>
                        <td>
                            <button class="btn btn-sm ${statusBtnClass}" onclick="changeUserStatus(${user.id}, ${newStatus})">${statusBtnText}</button>
                            <button class="btn btn-sm btn-danger ms-1" onclick="deleteUser(${user.id})">删除</button>
                        </td>
                    </tr>
                `;
                $tbody.append(tr);
            });
        }

        // 切换用户状态
        function changeUserStatus(userId, newStatus) {
            const tip = newStatus === 0 ? "确定要禁用该用户吗？" : "确定要启用该用户吗？";
            if (!confirm(tip)) return;

            $.ajax({
                url: "/admin/api/user/change-status",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    userId: userId,
                    status: newStatus
                }),
                success: function(res) {
                    if (res.code === 200) {
                        alert("操作成功！");
                        loadUserList();
                    } else {
                        alert("操作失败：" + res.msg);
                    }
                },
                error: function(xhr) {
                    console.error(xhr);
                    alert("网络异常，操作失败");
                }
            });
        }

        // 删除单个用户
        function deleteUser(userId) {
            if (!confirm("确定要删除该用户吗？删除后不可恢复！")) return;

            $.ajax({
                url: "/admin/api/user/delete",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({ userId: userId }),
                success: function(res) {
                    if (res.code === 200) {
                        alert("删除成功！");
                        loadUserList();
                    } else {
                        alert("删除失败：" + res.msg);
                    }
                },
                error: function(xhr) {
                    console.error(xhr);
                    alert("网络异常，删除失败");
                }
            });
        }

        // 批量删除用户
        function batchDeleteUser() {
            const ids = [];
            $('tbody input[type="checkbox"]:checked').each(function() {
                ids.push($(this).val());
            });

            if (ids.length === 0) {
                alert("请先选择要删除的用户！");
                return;
            }

            if (!confirm(`确定要删除选中的 ${ids.length} 个用户吗？`)) return;

            $.ajax({
                url: "/admin/api/user/batchDelete",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(ids),
                success: function(res) {
                    if (res.code === 200) {
                        alert("批量删除成功！");
                        loadUserList();
                    } else {
                        alert("删除失败：" + res.msg);
                    }
                },
                error: function() {
                    alert("网络异常，批量删除失败");
                }
            });
        }

        // 渲染分页
        function renderPagination(total) {
            const totalPages = Math.ceil(total / pageSize);
            const $pagination = $('#pagination');
            $pagination.empty();
            $pagination.data('total', total);

            // 上一页
            const prevBtn = `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="javascript:changePage(${currentPage - 1})">上一页</a>
                </li>
            `;
            $pagination.append(prevBtn);

            // 页码
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="javascript:changePage(${i})">${i}</a>
                    </li>
                `;
                $pagination.append(pageBtn);
            }

            // 下一页
            const nextBtn = `
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="javascript:changePage(${currentPage + 1})">下一页</a>
                </li>
            `;
            $pagination.append(nextBtn);
            $pagination.wrap('<ul class="pagination"></ul>');
        }

        // 切换页码
        function changePage(page) {
            const total = $('#pagination').data('total') || 0;
            const totalPages = Math.ceil(total / pageSize) || 1;
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadUserList();
        }
    </script>
</body>
</html>
