<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录-中华武术研学交流网</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="page-outer">
        <div class="login-page">
            <div class="login-banner"></div>
            <div class="login-container">
                <div class="login-card">
                    <div class="login-header">
                        <h3><i class="fas fa-fist-raised me-2"></i>中华武术研学交流网</h3>
                        <p class="mb-0 mt-2">欢迎登录，一起传承武魂</p>
                    </div>
                    <div class="login-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">用户名/手机号</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control" id="username" placeholder="请输入用户名或手机号" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">密码</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                                    <span class="input-group-text password-toggle" id="togglePassword">
                                        <i class="fas fa-eye-slash"></i>
                                    </span>
                                </div>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">记住我</label>
                            </div>
                            <button type="submit" class="btn-login">登录</button>
                        </form>
                        <div class="login-links">
                            <a href="register.html">注册账号</a> | <a href="forget.html">忘记密码？</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        localStorage.removeItem("user");
        localStorage.removeItem("userInfo");
        sessionStorage.clear();

        // 密码显示隐藏
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye-slash');
            icon.classList.toggle('fa-eye');
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const account = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!account) { alert('请输入账号！'); return; }
            if (!password) { alert('请输入密码！'); return; }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account, password })
                });

                const result = await res.json();
                console.log("登录返回：", result);

                if (result.code === 200) {
                    const userData = result.data;

                    localStorage.setItem("user", JSON.stringify({
                        id: userData.id,
                        username: userData.username,
                        avatar: userData.avatar || null
                    }));

                    alert('登录成功！');
                    location.href = 'index.html';
                } else {
                    alert(result.msg);
                }
            } catch (err) {
                console.error('登录请求异常：', err);
                alert('登录失败，服务器异常');
            }
        });
    </script>
</body>
</html>
