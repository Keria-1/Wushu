<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员后台 - 中华武术研学交流网</title>
    <link rel="stylesheet" href="/css/admin_index.css">
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <h1>中华武术研学交流网管理平台</h1>
        <div>
            <span style="margin-right: 10px;">超级管理员</span>
            <a href="/admin/logout">退出登录</a>
        </div>
    </div>

    <!-- 主体容器：侧边栏 + 内容区 -->
    <div class="main-container">
       <!-- 左侧侧边栏 -->
        <div class="sidebar">
            <a href="/admin/index.html" class="menu-item">系统首页</a>
            <a href="/admin/user.html" class="menu-item active">用户管理</a>
            <a href="/admin/research.html" class="menu-item">研学项目管理</a>
            <a href="/admin/news.html" class="menu-item">武术资讯管理</a>
            <a href="/admin/enroll.html" class="menu-item">报名审核管理</a>
            <a href="/admin/carousel.html" class="menu-item">轮播图管理</a>
            <a href="/admin/log.html" class="menu-item">操作日志</a>
        </div>

        <!-- 右侧内容区域 -->
        <div class="content">
            <div class="welcome">欢迎进入管理员后台！</div>
            
            <!-- 数据统计卡片 -->
            <div class="stats-card">
                <div class="stat-item">
                    <h3>注册用户总数</h3>
                    <div class="num" id="userCount">0</div>
                </div>
                <div class="stat-item">
                    <h3>研学项目数量</h3>
                    <div class="num" id="researchCount">0</div>
                </div>
                <div class="stat-item">
                    <h3>资讯发布数量</h3>
                    <div class="num" id="consultCount">0</div>
                </div>
                <div class="stat-item">
                    <h3>报名申请总数</h3>
                    <div class="num" id="enrollCount">0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 退出登录功能
        function logout() {
            fetch('/admin/logout')
            .then(() => {
                window.location.href = '/admin/login.html';
            })
            .catch(err => console.error('退出登录失败:', err));
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch('/admin/api/stats'); 
                const data = await response.json();

                if (data.code === 200) {
                    document.getElementById('userCount').textContent = data.data.user_total || 0;
                    document.getElementById('researchCount').textContent = data.data.project_total || 0;
                    document.getElementById('consultCount').textContent = data.data.news_total || 0;
                    document.getElementById('enrollCount').textContent = data.data.application_total || 0;
                } else {
                    throw new Error(data.msg || "接口异常");
                }
            } catch (err) {
                console.error('获取统计数据失败:', err);
                // 失败时显示错误标记
                document.querySelectorAll('.num').forEach(el => el.textContent = '—');
            }
        }

        // 页面加载完成后执行
        window.onload = function() {
            const currentPath = window.location.pathname;
            const menuItems = document.querySelectorAll('.sidebar .menu-item');
            
            menuItems.forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('href') === currentPath) {
                    item.classList.add('active');
                }
            });

            // 加载真实统计数据
            loadStats();
        }
    </script>
</body>
</html>
